<html>
<head>
    <title> Meu Bicho </title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-pink-50 min-h-screen flex flex-col" 
    style="background-color: B4B9BC;
    background-image: url('background.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-color 3s;";>
    
<div class="w-full flex items-center justify-start p-4 gap-4">
    <div class="avatar">
        <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2">
            <img src="normal.png" />
        </div>
    </div>

<!-- <input id="mudarFundo" type="checkbox" checked="checked" class="toggle toggle-warning" /> -->


</div>

    <input 
      type="text" 
      placeholder="Nome da criatura" 
      class="input input-primary"
      style="width: 150px;"
    />

    <div class="flex flex-col items-center w-full px-4">
        <img id="b" 
        src="normal.png"
        alt="Imagem principal"
        class="w-full max-w-md h-auto">
    </div>

    <div class="mt-12 flex justify-center w-full">
        <img id="btn" 
        src="cookie.png" 
        alt="Botão"
        class="w-1/3 max-w-[180px] h-auto active:scale-95 transition"        
        onclick="alimentar()">
    </div>


  <div class="drawer drawer-end">
  <input id="my-drawer-5" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <label for="my-drawer-5" class="drawer-button btn btn-primary"> :3 </label>
  </div>
  <div class="drawer-side">
    <label for="my-drawer-5" aria-label="close sidebar" class="drawer-overlay"></label>
    <ul class="menu bg-base-200 min-h-full w-80 p-4">
      <li><a> <img src="ferlini.png"> </img></a></li>
    </ul>
  </div>
</div>


    </div>
    
</body>
<script src="script.js"> </script>
</html>
